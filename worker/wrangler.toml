name = "managerpack-webhook"
main = "index.js"
compatibility_date = "2024-01-01"
# account_id is read from CLOUDFLARE_ACCOUNT_ID env var (loaded from .env.dev / .env.prod).
# Wrangler can't auto-discover it because our token lacks the memberships read scope.

[vars]
ENVIRONMENT = "production"
# R2 prefix for all managerpack objects
R2_PREFIX = "managerpacks"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "iybi-sites"

# Secrets (set via `wrangler secret put`):
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
